name: fintech

# ── One-box stack ─────────────────────────────────────────────────────────────
# Local (reworked apps only):                   docker compose up -d
# Add the bank + casino:                        docker compose --profile bank --profile casino up -d
# Full production edge (Caddy TLS + Datadog):   docker compose --profile bank --profile casino --profile edge up -d
#
# App + DB host ports bind to 127.0.0.1 only, so nothing but Caddy (80/443) is
# reachable from outside the box. Containers talk to each other over the internal
# Docker network, and local dev still works via localhost. See infra/README.md.

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    labels:
      com.datadoghq.ad.logs: '[{"source": "postgresql", "service": "fintech-postgres"}]'
    environment:
      POSTGRES_USER: fintech
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fintech_dev_password}
      POSTGRES_DB: postgres
      TICKETING_DB_PASSWORD: ${TICKETING_DB_PASSWORD:-ticketing_dev}
      MOCKBANK_DB_PASSWORD: ${MOCKBANK_DB_PASSWORD:-mockbank_dev}
    ports:
      - '127.0.0.1:${POSTGRES_HOST_PORT:-5432}:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U fintech -d postgres']
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Help Desk Hero (reworked) ───────────────────────────────────────────────
  ticketing-server:
    build: ./Ticketing-tool-server
    restart: unless-stopped
    labels:
      com.datadoghq.ad.logs: '[{"source": "nodejs", "service": "ticketing-api"}]'
    environment:
      NODE_ENV: production
      API_PORT: 3001
      DATABASE_URL: postgres://ticketing_user:${TICKETING_DB_PASSWORD:-ticketing_dev}@postgres:5432/ticketing
      AUTH_MODE: ${TICKETING_AUTH_MODE:-dev}
      DEV_AUTH_SECRET: ${TICKETING_DEV_SECRET:-dev-only-secret-change-me}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      COGNITO_USER_POOL_ID: ${TICKETING_COGNITO_POOL_ID:-}
      COGNITO_CLIENT_ID: ${TICKETING_COGNITO_CLIENT_ID:-}
      FRONTEND_URL: ${TICKETING_FRONTEND_URL:-http://localhost:8081}
      LOG_LEVEL: info
    ports:
      - '127.0.0.1:3001:3001'
    depends_on:
      postgres:
        condition: service_healthy

  ticketing-client:
    build:
      context: ./Ticketing-tool-client
      args:
        VITE_API_URL: ${TICKETING_API_URL:-http://localhost:3001/api/v1}
        VITE_AUTH_MODE: ${TICKETING_AUTH_MODE:-dev}
        VITE_AWS_REGION: ${AWS_REGION:-us-east-1}
        VITE_COGNITO_USER_POOL_ID: ${TICKETING_COGNITO_POOL_ID:-}
        VITE_COGNITO_USER_POOL_CLIENT_ID: ${TICKETING_COGNITO_CLIENT_ID:-}
        VITE_DEMO_EMAIL: ${TICKETING_DEMO_EMAIL:-demo@georgegarciadev.com}
        VITE_DEMO_PASSWORD: ${TICKETING_DEMO_PASSWORD:-}
    restart: unless-stopped
    labels:
      com.datadoghq.ad.logs: '[{"source": "nginx", "service": "ticketing-web"}]'
    ports:
      - '127.0.0.1:8081:80'

  # ── Portfolio (reworked) ────────────────────────────────────────────────────
  portfolio:
    build:
      context: ./Portfolio
      args:
        VITE_CONTACT_ENDPOINT: ${CONTACT_ENDPOINT:-}
    restart: unless-stopped
    labels:
      com.datadoghq.ad.logs: '[{"source": "nginx", "service": "portfolio"}]'
    ports:
      - '127.0.0.1:8080:80'

  # ── Mock Bank (not reworked — wired for the one-box deploy) ──────────────────
  mockbank-api:
    profiles: ['bank']
    build:
      context: ./mock-bank
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    labels:
      com.datadoghq.ad.logs: '[{"source": "nodejs", "service": "mockbank-api"}]'
    environment:
      NODE_ENV: production
      API_PORT: 3000
      DATABASE_URL: postgres://mockbank_user:${MOCKBANK_DB_PASSWORD:-mockbank_dev}@postgres:5432/mockbank
      JWT_SECRET: ${MOCKBANK_JWT_SECRET:-change-me-in-production}
      FRONTEND_URL: ${MOCKBANK_FRONTEND_URL:-http://localhost:8082}
      DEMO_PASSWORD: ${DEMO_PASSWORD:-}
    ports:
      - '127.0.0.1:3000:3000'
    depends_on:
      postgres:
        condition: service_healthy

  mockbank-web:
    profiles: ['bank']
    build:
      context: ./mock-bank
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_URL: ${MOCKBANK_API_URL:-http://localhost:3000/api}
        VITE_DEMO_PASSWORD: ${DEMO_PASSWORD:-}
    restart: unless-stopped
    labels:
      com.datadoghq.ad.logs: '[{"source": "nginx", "service": "mockbank-web"}]'
    ports:
      - '127.0.0.1:8082:80'

  mockbank-admin-api:
    profiles: ['bank']
    build:
      context: ./mock-bank
      dockerfile: apps/admin-api/Dockerfile
    restart: unless-stopped
    labels:
      com.datadoghq.ad.logs: '[{"source": "nodejs", "service": "mockbank-admin-api"}]'
    environment:
      NODE_ENV: production
      ADMIN_API_PORT: 4001
      DATABASE_URL: postgres://mockbank_user:${MOCKBANK_DB_PASSWORD:-mockbank_dev}@postgres:5432/mockbank
      JWT_SECRET: ${MOCKBANK_JWT_SECRET:-change-me-in-production}
      ADMIN_FRONTEND_URL: ${MOCKBANK_ADMIN_FRONTEND_URL:-http://localhost:8083}
    ports:
      - '127.0.0.1:4001:4001'
    depends_on:
      postgres:
        condition: service_healthy

  mockbank-admin:
    profiles: ['bank']
    build:
      context: ./mock-bank
      dockerfile: apps/admin/Dockerfile
      args:
        VITE_ADMIN_API_URL: ${MOCKBANK_ADMIN_API_URL:-http://localhost:4001/api}
        VITE_DEMO_PASSWORD: ${DEMO_PASSWORD:-}
    restart: unless-stopped
    labels:
      com.datadoghq.ad.logs: '[{"source": "nginx", "service": "mockbank-admin"}]'
    ports:
      - '127.0.0.1:8083:80'

  # ── Lucky Spin Casino (not reworked — wired for the one-box deploy) ──────────
  casino-server:
    profiles: ['casino']
    build:
      context: ./mock-gambling-site
      dockerfile: server/Dockerfile
    restart: unless-stopped
    labels:
      com.datadoghq.ad.logs: '[{"source": "nodejs", "service": "casino-api"}]'
    environment:
      NODE_ENV: production
      PORT: 4100
      CASINO_DB_PATH: /data/casino.db
      DEMO_PASSWORD: ${DEMO_PASSWORD:-}
    volumes:
      - casino_data:/data
    ports:
      - '127.0.0.1:4100:4100'

  casino-web:
    profiles: ['casino']
    build:
      context: ./mock-gambling-site
      dockerfile: web/Dockerfile
      args:
        VITE_API_URL: ${CASINO_API_URL:-http://localhost:4100}
        VITE_DEMO_PASSWORD: ${DEMO_PASSWORD:-}
    restart: unless-stopped
    labels:
      com.datadoghq.ad.logs: '[{"source": "nginx", "service": "casino-web"}]'
    ports:
      - '127.0.0.1:8084:80'

  # ── Glow (video-first dating; separate repo, its own Neon DB + Redis) ───────
  # Defaults to APP_ENV=staging (cheap SMS/social bypass) for prod testing. Flip the
  # GLOW_* vars to production values when ready. Needs GLOW_DATABASE_URL (Neon) set.
  glow-redis:
    profiles: ['glow']
    image: redis:7-alpine
    restart: unless-stopped
    command: ['redis-server', '--save', '', '--appendonly', 'no']

  glow-api:
    profiles: ['glow']
    build:
      context: ./Glow
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    labels:
      com.datadoghq.ad.logs: '[{"source": "nodejs", "service": "glow-api"}]'
    environment:
      NODE_ENV: production
      APP_ENV: ${GLOW_APP_ENV:-staging}
      API_PORT: 3000
      WEB_ORIGIN: https://glowapp.georgegarciadev.com
      SESSION_JWT_SECRET: ${GLOW_SESSION_JWT_SECRET:-dev-session-secret-change-me}
      DATABASE_URL: ${GLOW_DATABASE_URL}
      REDIS_URL: redis://glow-redis:6379
      SMS_MODE: ${GLOW_SMS_MODE:-dev}
      SMS_SENDER_ID: ${GLOW_SMS_SENDER_ID:-}
      SMS_ORIGINATION_NUMBER: ${GLOW_SMS_ORIGINATION_NUMBER:-}
      PHONE_PEPPER: ${GLOW_PHONE_PEPPER:-dev-pepper-change-me}
      DEFAULT_PHONE_COUNTRY: ${GLOW_DEFAULT_PHONE_COUNTRY:-US}
      SOCIAL_MODE: ${GLOW_SOCIAL_MODE:-dev}
      GOOGLE_CLIENT_ID: ${GLOW_GOOGLE_CLIENT_ID:-}
      APPLE_CLIENT_ID: ${GLOW_APPLE_CLIENT_ID:-}
      ADMIN_PHONES: ${GLOW_ADMIN_PHONES:-}
      ADMIN_EMAILS: ${GLOW_ADMIN_EMAILS:-}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      MODERATION_MODE: ${GLOW_MODERATION_MODE:-dev}
      FREE_DAILY_VIDEO_SECONDS: ${GLOW_FREE_DAILY_VIDEO_SECONDS:-3600}
      STRIPE_SECRET_KEY: ${GLOW_STRIPE_SECRET_KEY:-}
      STRIPE_PRICE_ID: ${GLOW_STRIPE_PRICE_ID:-}
      STRIPE_WEBHOOK_SECRET: ${GLOW_STRIPE_WEBHOOK_SECRET:-}
      LIVEKIT_URL: ${GLOW_LIVEKIT_URL:-}
      LIVEKIT_API_KEY: ${GLOW_LIVEKIT_API_KEY:-}
      LIVEKIT_API_SECRET: ${GLOW_LIVEKIT_API_SECRET:-}
      LIVEKIT_WEBHOOK_KEY: ${GLOW_LIVEKIT_WEBHOOK_KEY:-}
      MEDIA_S3_BUCKET: ${GLOW_MEDIA_S3_BUCKET:-}
      MEDIA_CLOUDFRONT_DOMAIN: ${GLOW_MEDIA_CLOUDFRONT_DOMAIN:-}
      MEDIA_CLOUDFRONT_KEY_PAIR_ID: ${GLOW_MEDIA_CLOUDFRONT_KEY_PAIR_ID:-}
      MEDIA_CLOUDFRONT_PRIVATE_KEY: ${GLOW_MEDIA_CLOUDFRONT_PRIVATE_KEY:-}
    depends_on:
      - glow-redis

  glow-web:
    profiles: ['glow']
    build:
      context: ./Glow
      dockerfile: apps/web/Dockerfile
      args:
        # Same-origin: Caddy proxies /api + /socket.io to glow-api.
        VITE_API_URL: ''
        VITE_SOCKET_URL: ''
    restart: unless-stopped
    labels:
      com.datadoghq.ad.logs: '[{"source": "nginx", "service": "glow-web"}]'

  glow-admin:
    profiles: ['glow']
    build:
      context: ./Glow
      dockerfile: apps/admin/Dockerfile
    restart: unless-stopped
    labels:
      com.datadoghq.ad.logs: '[{"source": "nginx", "service": "glow-admin"}]'

  glow-landing:
    profiles: ['glow']
    build:
      context: ./Glow/apps/landing
      args:
        GLOW_APP_URL: ${GLOW_APP_URL:-https://glowapp.georgegarciadev.com}
    restart: unless-stopped
    labels:
      com.datadoghq.ad.logs: '[{"source": "nginx", "service": "glow-landing"}]'

  # ── Production edge (Caddy TLS + Datadog) ───────────────────────────────────
  caddy:
    profiles: ['edge']
    build: ./infra/caddy
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./infra/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

  datadog-agent:
    profiles: ['edge']
    image: gcr.io/datadoghq/agent:7
    restart: unless-stopped
    environment:
      DD_API_KEY: ${DD_API_KEY:-}
      DD_SITE: ${DD_SITE:-datadoghq.com}
      DD_LOGS_ENABLED: 'true'
      DD_LOGS_CONFIG_CONTAINER_COLLECT_ALL: 'true'
      DD_CONTAINER_EXCLUDE: 'name:datadog-agent'
      DD_APM_ENABLED: 'true'
      DD_APM_NON_LOCAL_TRAFFIC: 'true'
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /proc/:/host/proc/:ro
      - /sys/fs/cgroup/:/host/sys/fs/cgroup:ro

volumes:
  pgdata:
  caddy_data:
  caddy_config:
  casino_data:
